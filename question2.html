<h1>Mr. Surname Blender</h1>

<div>
    <span>Surname:</span>
    <input id="surname" type="text" size="20" />
</div>

<div>
    <span>Font:</span>
    <select id="font">
        <option>Arial</option>
        <option>Comic Sans MS</option>
        <option>Times New Roman</option>
        <option>Verdana</option>
    </select>
</div>

<div>
    <span>Position:</span>

    
    <input id="inorder" name="pos" type="radio" checked="checked" />
    Inorder

    <input id="random" name="pos" type="radio" />
    Random

    <input id="reverse" name="pos" type="radio" />
    Reverse
</div>

<br>


<div>
    <span>Color:</span>
    <select id="color">
        <option value="black">Black</option>
        <option value="red">Red</option>
        <option value="blue">Blue</option>
        <option value="green">Green</option>
    </select>

    <span>Font Size:</span>
    <input id="size" type="number" value="16" />
</div>

<br>

<button id="blend-btn">Blend Now</button>

<br><br>

<div id="output" style="position:relative; width:300px; height:150px; border:1px solid black;"></div>
<script src="question.js"></script>
